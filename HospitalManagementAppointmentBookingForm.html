<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking Form</title>
</head>
<body>
    <center><h2>Appointment Booking Form</h2></center>
    <hr>
    <form>
        <label for="patientName">Patient Name:</label>
        <input type="text" id="patientName" name="patientName" required><br><br>

        <label for="doctor">Doctor:</label>
        <select id="doctor" name="doctor" required>
            <option value="">Select a doctor</option>
            <option value="dr_smith">Dr. Smith</option>
            <option value="dr_johnson">Dr. Johnson</option>
            <option value="dr_williams">Dr. Williams</option>
        </select><br><br>

        <label for="date">Date:</label>
        <input type="date" id="date" name="date" required><br><br>

        <label for="time">Time:</label>
        <input type="time" id="time" name="time" required><br><br>

        <input type="submit" value="Book Appointment">
    </form>
     <footer>
        <p>For any inquiries, please contact our support team at support@hospital.com</p><br>

</body>
</html>
